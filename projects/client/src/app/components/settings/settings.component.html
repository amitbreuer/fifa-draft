<div class="settings-page">
  <button class="back-btn" (click)="goBack()">←</button>

  <div class="hero">
    <h1 class="logo">Galactico</h1>
    <p class="tagline">Local Draft</p>
  </div>

  @if (hasSavedDrafts()) {
    <div class="section">
      <h3>Continue Draft</h3>
      <div class="form-group">
        <p-select
          id="savedDraft"
          [options]="savedDrafts"
          [(ngModel)]="selectedSavedDraft"
          placeholder="Choose a saved draft"
          [style]="{'width': '100%'}"
        ></p-select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary btn-sm" [disabled]="!selectedSavedDraft" (click)="continueDraft()">Continue</button>
        <button class="btn btn-danger btn-sm" [disabled]="!selectedSavedDraft" (click)="deleteSavedDraft()">Delete</button>
      </div>
    </div>
  }

  <div class="section">
    <h3>New Draft</h3>

    <div class="form-group">
      <label>Player Data</label>
      <select [(ngModel)]="selectedDatasetId" class="input">
        @for (ds of datasets; track ds.id) {
          <option [value]="ds.id">{{ ds.label }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label>Draft Name</label>
      <input type="text" [(ngModel)]="draftName" placeholder="Galactico" class="input" />
    </div>

    <div class="form-group">
      <label>Rounds</label>
      <div class="stepper">
        <button (click)="maxRounds = Math.max(5, maxRounds - 1)">−</button>
        <span>{{ maxRounds }}</span>
        <button (click)="maxRounds = Math.min(30, maxRounds + 1)">+</button>
      </div>
    </div>

    <div class="managers-section">
      <label>Managers</label>
      <div class="manager-inputs">
        @for (manager of managerNames; track $index; let i = $index) {
          <div class="manager-input-row">
            <input
              type="text"
              [(ngModel)]="managerNames[i]"
              [placeholder]="'Manager ' + (i + 1)"
              class="input"
            />
            @if (managerNames.length > 2) {
              <button class="btn-remove" (click)="removeManager(i)">✕</button>
            }
          </div>
        }
      </div>
      @if (managerNames.length < 10) {
        <button class="btn-add" (click)="addManager()">+ Add Manager</button>
      }
    </div>

    <button class="btn btn-primary btn-start" [disabled]="!canStartDraft()" (click)="startDraft()">
      🚀 Start Draft
    </button>
  </div>
</div>
